<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resume | Jyoti</title>
    <style>
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        display: grid;
        min-height: 100vh;
        place-items: center;
        background: #fafafa;
        color: #1a1a1a;
      }
      .card {
        width: min(560px, calc(100% - 32px));
        border: 1px solid #dedede;
        border-radius: 16px;
        padding: 28px;
        background: #fff;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      }
      h1 {
        margin: 0 0 10px;
      }
      a {
        color: #f47025;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Resume Page</h1>
      <p>Add your PDF or full resume content here.</p>
      <p>
        Example: place a file as <code>public/resume.pdf</code> and link to
        <a href="/resume.pdf">/resume.pdf</a>.
      </p>
    </main>
  </body>
</html>
