<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Jyoti</title>
    <style>
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        display: grid;
        min-height: 100vh;
        place-items: center;
        background: #fafafa;
        color: #1b1b1b;
      }
      .card {
        width: min(560px, calc(100% - 32px));
        border: 1px solid #dedede;
        border-radius: 16px;
        padding: 28px;
        background: #fff;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      }
      h1 {
        margin: 0 0 12px;
      }
      a {
        color: #f47025;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Let&apos;s Talk</h1>
      <p>Replace this with your real contact details.</p>
      <p><a href="mailto:hello@example.com">hello@example.com</a></p>
    </main>
  </body>
</html>
